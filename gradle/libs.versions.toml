refine-annotation = { group = "dev.rikka.tools.refine", name = "annotation", version.ref = "rikkaRefine" }
refine-annotation-processor = { group = "dev.rikka.tools.refine", name = "annotation-processor", version.ref = "rikkaRefine" }
kotlin-gradlePlugin = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }


[plugins]
nll-newDslPlugin = { id = "nll.newdsl", version.ref = "nllPluginVersion" }
nll-copyArtifactsPlugin = { id = "nll.copyArtifacts", version.ref = "copyArtifactsPluginVersion" }
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
rikka-refine = { id = "dev.rikka.tools.refine", version.ref = "rikkaRefine" }
